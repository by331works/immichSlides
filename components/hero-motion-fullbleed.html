<script>
function __sizeHeroComponent(){
  const w=window.innerWidth,h=window.innerHeight;
  const isDesktop=w>=1200;
  const s=Math.max(w/3696,h/1584);
  document.documentElement.style.setProperty('--component-scale',s.toFixed(6));
  if(isDesktop){
    document.documentElement.style.setProperty('--artboard-left','50%');
    document.documentElement.style.setProperty('--artboard-top','50%');
  }else if(w>700){
    // Tablet right-edge anchor: pin the TV/screen right edge to viewportWidth - 70px.
    // Native TV transparent/screen right edge ~= 2882px on a 3696px artboard.
    const ARTBOARD_HALF_W=1848;
    const TV_RIGHT_X=2882;
    const RIGHT_GAP=70;
    const centerX=w-RIGHT_GAP-((TV_RIGHT_X-ARTBOARD_HALF_W)*s);
    document.documentElement.style.setProperty('--artboard-left',centerX.toFixed(2)+'px');
    document.documentElement.style.setProperty('--artboard-top','50%');
  }else{
    // Mobile v3.15: keep v3.14 measured scale, move iPad slightly inside for breathing room.
    const ARTBOARD_HALF_W=1848;
    const IPAD_LEFT_X=1483;
    const IPAD_LEFT_TARGET=8;
    // Mobile direct-join framing: the artboard must cover the full hero height so
    // the Hero image touches the second screen directly, with no colored spacer.
    const BASE_MOBILE_SCALE=Math.min(0.50, Math.max(0.45, w/1450));
    const mobileScale=BASE_MOBILE_SCALE*(1265/1409);
    const centerX=IPAD_LEFT_TARGET+((ARTBOARD_HALF_W-IPAD_LEFT_X)*mobileScale);
    document.documentElement.style.setProperty('--component-scale',mobileScale.toFixed(6));
    document.documentElement.style.setProperty('--artboard-left',centerX.toFixed(2)+'px');
    document.documentElement.style.setProperty('--artboard-top','50%');
  }
}
window.addEventListener('resize',__sizeHeroComponent);__sizeHeroComponent();
</script>
<script>(()=>{const slots=['slot-exit-left','slot-l2','slot-l1','slot-main','slot-r1'];const reset='slot-enter-right';const cards=[...document.querySelectorAll('.card')];let locked=false;function imgSrc(card){return card.querySelector('img')?.getAttribute('src')||''}function setImg(card,src){const img=card.querySelector('img');if(img&&src&&img.getAttribute('src')!==src)img.src=src}function setSlot(card,slot,noTransition=false){card.classList.remove('slot-exit-left','slot-l2','slot-l1','slot-main','slot-r1','slot-enter-right');if(noTransition)card.classList.add('no-transition');card.classList.add(slot);if(noTransition)requestAnimationFrame(()=>requestAnimationFrame(()=>card.classList.remove('no-transition')))}function prepareHiddenIncoming(){if(cards.length<2)return;setImg(cards[cards.length-1],imgSrc(cards[0]))}prepareHiddenIncoming();function advance(){if(locked)return;locked=true;prepareHiddenIncoming();cards.forEach((card,i)=>setSlot(card,slots[i]));setTimeout(()=>{const exiting=cards.shift();const nextOutgoingSrc=imgSrc(cards[0]);setImg(exiting,nextOutgoingSrc);setSlot(exiting,reset,true);cards.push(exiting);locked=false},990)}setInterval(advance,2600)})();</script></body></html>
